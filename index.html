<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StadiumOS AI — FIFA World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Geist:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23C6F135'/><text x='50' y='68' font-size='50' text-anchor='middle'>⚽</text></svg>">
</head>
<body>
<div class="app">
  <!-- ══════════ LEFT RAIL ══════════ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">⚽</div>
      <span class="brand-name">STADIUM<b>OS</b></span>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="dashboard"><span class="nav-ic">▦</span>Dashboard</button>
      <button class="nav-item" data-view="security"><span class="nav-ic">◉</span>Security</button>
      <button class="nav-item" data-view="emergency"><span class="nav-ic">✚</span>Emergency</button>
      <button class="nav-item" data-view="twin"><span class="nav-ic">◈</span>Digital Twin</button>
      <button class="nav-item" data-view="volunteers"><span class="nav-ic">🤝</span>Volunteers</button>
      <button class="nav-item" data-view="transport"><span class="nav-ic">⇄</span>Transport</button>
      <button class="nav-item" data-view="sustainability"><span class="nav-ic">♻</span>Sustainability</button>
      <button class="nav-item" data-view="aicenter"><span class="nav-ic">✦</span>AI Control</button>
      <button class="nav-item" data-view="fan"><span class="nav-ic">☺</span>Fan App</button>
    </nav>
    <div class="sidebar-bottom">
      <div class="ai-orb-card" onclick="openAssistant()">
        <div class="ai-orb"></div>
        <div class="ai-ask">Ask anything ... <span class="mic"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></span></div>
      </div>
      <div class="account">
        <div class="avatar">PR</div>
        <div>
          <div class="acct-name">Priya R.</div>
          <div class="acct-role">Stadium Ops Manager</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <main class="main">
    <header class="topbar">
      <div class="search"><span>⌕</span><input placeholder="Search incidents, sections, units..." id="globalSearch"></div>
      <div class="topbar-right">
        <div class="pill pill-live"><span class="dot dot-red pulse"></span>LIVE · MetLife Stadium</div>
        <div class="clock" id="clock">--:--:--</div>
        <button class="icon-btn" title="Settings">⚙</button>
        <button class="icon-btn" title="Notifications" id="bellBtn">🔔<span class="badge" id="notifBadge">3</span></button>
      </div>
    </header>

    <div class="views" id="views"></div>
  </main>
</div>

<!-- ══════════ AI ASSISTANT DRAWER ══════════ -->
<div class="assistant-overlay" id="assistantOverlay" onclick="closeAssistant(event)">
  <div class="assistant" onclick="event.stopPropagation()">
    <div class="assistant-head">
      <div class="bot-avatar">
        <div class="bot-face"><span class="bot-eye"></span><span class="bot-eye"></span></div>
      </div>
      <div style="flex:1"></div>
      <button class="ground-toggle" id="groundToggle" onclick="toggleGrounding(this)" title="Ground answers in live Google Search data"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></button>
      <button class="head-btn" onclick="clearChat()" title="New chat"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
      <button class="head-btn" onclick="closeAssistant()" title="Close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="assistant-log" id="assistantLog"></div>
    <div class="assistant-input-wrap">
      <form class="composer" onsubmit="askAssistant(event)">
        <textarea id="assistantField" placeholder="Type your message..." rows="1"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askAssistant(event)}"></textarea>
        <button class="composer-send" type="submit" title="Send"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></button>
      </form>
      <button type="button" class="mic-fab" id="voiceBtn" onclick="startVoice()" title="Voice input"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="config.js"></script>
<script src="gemini.js"></script>
<script src="app.js"></script>
</body>
</html>
